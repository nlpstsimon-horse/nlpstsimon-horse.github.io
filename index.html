<!DOCTYPE html>
<html lang="zh-Hant">

    <style>
        @import url('https://fonts.googleapis.com');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- 導航列 -->
    <nav class="p-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-widest text-indigo-600">MY SPACE</h1>
            <div class="space-x-4 text-sm font-medium">
                <a href="#about" class="hover:text-indigo-500">關於我</a>
                <a href="#projects" class="hover:text-indigo-500">作品</a>
                <a href="#contact" class="hover:text-indigo-500">聯絡</a>
            </div>
        </div>
    </nav>

    <!-- 主視覺區 -->
    <header class="py-20 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <img src="https://via.placeholder.com" alt="大頭照" class="w-32 h-32 rounded-full mx-auto mb-6 border-4 border-white shadow-lg">
            <h2 class="text-4xl font-bold mb-4">你好，我是 <span class="text-indigo-600">nlpstsimon</span></h2>

            <div class="flex justify-center space-x-4">
                <a href="#contact" class="bg-indigo-600 text-white px-8 py-3 rounded-full hover:bg-indigo-700 transition shadow-md">聯絡我</a>
                <a href="https://github.com" target="_blank" class="border border-gray-300 px-8 py-3 rounded-full hover:bg-white transition">GitHub</a>
            </div>
        </div>
    </header>

    <!-- 技能區 -->
    <section id="about" class="py-16 bg-white px-6">
        <div class="max-w-4xl mx-auto">
            <h3 class="text-2xl font-bold mb-10 text-center">我的技能</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                <div class="p-6 rounded-xl bg-gray-50">
                    <div class="text-3xl mb-4">🎨</div>
                    <h4 class="font-bold mb-2">網頁設計</h4>
                    <p class="text-sm text-gray-500">HTML5, CSS3, Tailwind</p>
                </div>
                <div class="p-6 rounded-xl bg-gray-50">
                    <div class="text-3xl mb-4">🚀</div>
                    <h4 class="font-bold mb-2">前端開發</h4>
                    <p class="text-sm text-gray-500">JavaScript, Vue, React</p>
                </div>
                <div class="p-10 rounded-xl bg-gray-50">
                    <div class="text-3xl mb-4">⚙️</div>
                    <h4 class="font-bold mb-2">後端技術</h4>
                    <p class="text-sm text-gray-500">Node.js, Python, SQL</p>
                </div>
            </div>
        </div>

    <!-- 頁尾 -->
    <footer id="contact" class="py-12 bg-gray-900 text-white text-center">
        <div class="max-w-4xl mx-auto px-6">
            <p class="mb-4 text-gray-400">想找我聊聊嗎？</p>
            <a href="mailto:nlpstsimon01@mail.nlps.hc.edu.tw" class="text-xl font-bold hover:text-indigo-400">your-email@example.com</a>
            <p class="mt-8 text-xs text-gray-600">&copy; 2024 Your Name. All rights reserved.</p>
        </div>
